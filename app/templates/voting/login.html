{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-20">
    <div class="glass-bg p-10 rounded-3xl shadow-2xl border border-slate-100 flex flex-col items-center">
        <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center text-white mb-8 shadow-xl transform hover:rotate-12 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.14c1.744-2.772 2.753-6.054 2.753-9.571m0 0V5a2 2 0 012-2h2a2 2 0 012 2v6m0 0c0 3.517 1.009 6.799 2.753 9.571m-3.44-2.14c1.744-2.772 2.753-6.054 2.753-9.571m0 0h-2.14" />
            </svg>
        </div>
        <h2 class="text-4xl font-extrabold mb-4 text-slate-800 tracking-tight">Voter Login</h2>
        <p class="text-slate-500 mb-10 text-center text-lg leading-relaxed font-medium">Use your Student ID and temporary password to access the voting booth.</p>
        
        <form method="POST" class="w-full space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="space-y-2">
                <label for="student_id" class="block text-sm font-bold uppercase tracking-widest text-slate-400">Student ID</label>
                <input type="text" name="student_id" id="student_id" required placeholder="e.g. 20876543" class="w-full px-6 py-4 rounded-xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
            </div>
            <div class="space-y-2">
                <label for="password" class="block text-sm font-bold uppercase tracking-widest text-slate-400">Password</label>
                <input type="password" name="password" id="password" required placeholder="••••••••" class="w-full px-6 py-4 rounded-xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
            </div>
            <button type="submit" class="w-full bg-blue-600 py-4 rounded-xl text-white font-bold text-xl hover:bg-blue-700 shadow-xl transition-all hover:scale-[1.02] active:scale-95 mt-6">Enter Voting Portal</button>
        </form>
    </div>
</div>
{% endblock %}

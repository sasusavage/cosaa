{# Reusable live stats widget — include with: {% include 'voting/_live_stats.html' %} #}
<div class="max-w-4xl mx-auto mt-12">
    <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-50 overflow-hidden">
        <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Live Election Results</h2>
                <span id="live-dot" class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></span>
            </div>
            <div class="text-right">
                <p id="ls-voted" class="text-2xl font-black text-blue-600">—</p>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Ballots Cast</p>
            </div>
        </div>

        <div id="ls-body" class="p-8 space-y-10">
            <div class="flex items-center justify-center py-8">
                <div class="w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const POLL_URL = "{{ url_for('voting.live_stats_json') }}";

    function render(data) {
        const el = document.getElementById('ls-voted');
        if (el) el.textContent = data.voted_count + ' / ' + data.total_users;

        const body = document.getElementById('ls-body');
        if (!body) return;
        if (!data.portfolios.length) { body.innerHTML = '<p class="text-slate-400 italic text-center py-8">No results yet.</p>'; return; }

        body.innerHTML = data.portfolios.map(p => {
            if (!p.candidates.length) return '';
            const bars = p.candidates.map(c => `
                <div class="flex items-center gap-4">
                    <img src="${c.image_url || 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop'}"
                         class="w-11 h-11 rounded-xl object-cover flex-shrink-0 shadow" alt="${c.name}">
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between font-bold text-slate-700 text-sm mb-1">
                            <span class="truncate">${c.name}</span>
                            <span class="flex-shrink-0 ml-2 text-slate-400">${c.votes} (${c.pct}%)</span>
                        </div>
                        <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                            <div class="h-full bg-gradient-to-r from-blue-400 to-blue-600 rounded-full transition-all duration-700"
                                 style="width:${c.pct}%"></div>
                        </div>
                    </div>
                </div>`).join('');
            return `<div class="space-y-4">
                        <h3 class="text-base font-black text-slate-600 uppercase tracking-widest border-l-4 border-blue-500 pl-3">${p.title}</h3>
                        <div class="space-y-3">${bars}</div>
                    </div>`;
        }).join('');
    }

    function poll() {
        fetch(POLL_URL)
            .then(r => r.json())
            .then(data => {
                render(data);
                const dot = document.getElementById('live-dot');
                if (dot) { dot.classList.add('bg-blue-400'); setTimeout(() => dot.classList.remove('bg-blue-400'), 500); }
            })
            .catch(() => {});
    }

    poll();
    setInterval(poll, 5000);
})();
</script>

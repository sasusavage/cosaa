{% extends 'base.html' %}
{% block title %}{{ 'Edit' if event else 'Add' }} Event{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto py-12">
    <div class="glass-bg p-12 rounded-[3.5rem] shadow-2xl border border-slate-50">
        <h1 class="text-4xl font-black mb-4 text-slate-800 tracking-tighter">{{ 'Edit' if event else 'Add' }} Event</h1>
        <p class="text-lg text-slate-500 font-medium mb-10 italic border-b border-slate-100 pb-6">Fill in the event details.</p>
        <form method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Event Title</label>
                <input type="text" name="title" required value="{{ event.title if event else '' }}" placeholder="e.g. CoSSA Coding Challenge" class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Date</label>
                <input type="text" name="date" required value="{{ event.date if event else '' }}" placeholder="e.g. April 15, 2026" class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Description</label>
                <textarea name="description" rows="3" placeholder="Brief description..." class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium text-base">{{ event.description if event else '' }}</textarea>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Display Order</label>
                <input type="number" name="order" value="{{ event.order if event else 0 }}" min="0" class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
            </div>
            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-blue-600 py-4 rounded-2xl text-white font-black text-xl hover:bg-blue-700 shadow-xl transition-all">{{ 'Save Changes' if event else 'Add Event' }}</button>
                <a href="{{ url_for('admin.list_events') }}" class="px-8 py-4 bg-slate-100 rounded-2xl text-slate-400 font-bold hover:bg-slate-200 transition-all">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

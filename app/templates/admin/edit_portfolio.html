{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-12">
    <div class="glass-bg p-12 rounded-[3.5rem] shadow-2xl border border-slate-50">
        <h1 class="text-5xl font-black mb-4 text-slate-800 tracking-tighter">Edit Portfolio</h1>
        <p class="text-xl text-slate-500 font-medium mb-12 italic border-b border-slate-100 pb-8 leading-relaxed">Update the title or arrangement of this executive office.</p>
        
        <form method="POST" class="space-y-8">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="space-y-2">
                <label for="title" class="block text-sm font-bold uppercase tracking-widest text-slate-400">Portfolio Title</label>
                <input type="text" name="title" id="title" value="{{ portfolio.title }}" required class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
            </div>

            <div class="space-y-2">
                <label for="order" class="block text-sm font-bold uppercase tracking-widest text-slate-400">Ballot Order Index</label>
                <input type="number" name="order" id="order" value="{{ portfolio.order }}" required class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
                <p class="text-[0.65rem] text-slate-400 font-bold uppercase italic">Changing this will rearrange where this seat appears on the ballot.</p>
            </div>

            <div class="flex space-x-4 pt-6">
                <button type="submit" class="flex-1 bg-indigo-600 py-4 rounded-2xl text-white font-black text-xl hover:bg-slate-800 shadow-xl transition-all">Save Changes</button>
                <a href="{{ url_for('admin.dashboard') }}" class="px-8 py-4 bg-slate-100 rounded-2xl text-slate-400 font-bold hover:bg-slate-200 transition-all">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

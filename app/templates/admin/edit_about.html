{% extends 'base.html' %}
{% block title %}Edit About Page{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto py-12">
    <div class="glass-bg p-12 rounded-[3.5rem] shadow-2xl border border-slate-50">
        <h1 class="text-4xl font-black mb-4 text-slate-800 tracking-tighter">Edit About Page</h1>
        <p class="text-lg text-slate-500 font-medium mb-10 italic border-b border-slate-100 pb-6">Update the text displayed on the About page.</p>
        <form method="POST" class="space-y-8">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Mission Statement</label>
                <textarea name="about_mission" rows="5" required class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium text-base">{{ about_mission }}</textarea>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Vibrant Community Blurb</label>
                <textarea name="about_community" rows="3" required class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium text-base">{{ about_community }}</textarea>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Industry Focus Blurb</label>
                <textarea name="about_industry" rows="3" required class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium text-base">{{ about_industry }}</textarea>
            </div>
            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-blue-600 py-4 rounded-2xl text-white font-black text-xl hover:bg-blue-700 shadow-xl transition-all">Save Changes</button>
                <a href="{{ url_for('admin.dashboard') }}" class="px-8 py-4 bg-slate-100 rounded-2xl text-slate-400 font-bold hover:bg-slate-200 transition-all">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

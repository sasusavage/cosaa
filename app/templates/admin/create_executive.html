{% extends 'base.html' %}
{% block title %}{{ 'Edit' if exec else 'Add' }} Executive{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto py-12">
    <div class="glass-bg p-12 rounded-[3.5rem] shadow-2xl border border-slate-50">
        <h1 class="text-4xl font-black mb-4 text-slate-800 tracking-tighter">{{ 'Edit' if exec else 'Add' }} Executive</h1>
        <p class="text-lg text-slate-500 font-medium mb-10 italic border-b border-slate-100 pb-6">Fill in the executive's details.</p>
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Full Name</label>
                <input type="text" name="name" required value="{{ exec.name if exec else '' }}" placeholder="e.g. John Mensah" class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Role / Title</label>
                <input type="text" name="role" required value="{{ exec.role if exec else '' }}" placeholder="e.g. President" class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Bio / Quote</label>
                <textarea name="bio" rows="3" placeholder="Short quote or bio..." class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium text-base">{{ exec.bio if exec else '' }}</textarea>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Photo (Upload)</label>
                <input type="file" name="image_file" class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Photo URL (Fallback)</label>
                <input type="text" name="image_url" value="{{ exec.image_url if exec else '' }}" placeholder="https://..." class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium text-base">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">LinkedIn URL</label>
                    <input type="text" name="linkedin_url" value="{{ exec.linkedin_url if exec else '' }}" placeholder="https://linkedin.com/in/..." class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium text-base">
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Twitter/X URL</label>
                    <input type="text" name="twitter_url" value="{{ exec.twitter_url if exec else '' }}" placeholder="https://twitter.com/..." class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium text-base">
                </div>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Display Order</label>
                <input type="number" name="order" value="{{ exec.order if exec else 0 }}" min="0" class="w-full px-6 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 transition-all font-bold text-lg">
            </div>
            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-blue-600 py-4 rounded-2xl text-white font-black text-xl hover:bg-blue-700 shadow-xl transition-all">{{ 'Save Changes' if exec else 'Add Executive' }}</button>
                <a href="{{ url_for('admin.list_executives') }}" class="px-8 py-4 bg-slate-100 rounded-2xl text-slate-400 font-bold hover:bg-slate-200 transition-all">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Edit Site Content{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto py-12">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
        <h1 class="text-4xl font-black text-slate-800 tracking-tighter">Edit Site Content</h1>
        <a href="{{ url_for('admin.dashboard') }}" class="bg-slate-100 text-slate-600 px-6 py-3 rounded-2xl font-bold hover:bg-slate-200 border border-slate-200 text-sm">Dashboard</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-10">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <!-- Hero Section -->
        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-50 p-10 space-y-6">
            <h2 class="text-2xl font-black text-slate-700 border-l-4 border-blue-600 pl-4">Home Page — Hero</h2>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Main Title</label>
                <textarea name="hero_title" rows="3" required class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 font-bold text-lg transition-all">{{ hero_title }}</textarea>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Subtitle</label>
                <textarea name="hero_subtitle" rows="3" required class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 font-medium text-base transition-all">{{ hero_subtitle }}</textarea>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Hero Image — Upload New</label>
                <input type="file" name="hero_image_file" class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 font-medium transition-all">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Hero Image URL (leave blank to keep current)</label>
                <input type="text" name="hero_image" value="{{ hero_image }}" placeholder="https://..." class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 font-medium text-base transition-all">
            </div>
        </div>

        <!-- Executives preview subtitle -->
        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-50 p-10 space-y-6">
            <h2 class="text-2xl font-black text-slate-700 border-l-4 border-indigo-500 pl-4">Home Page — Executives Strip</h2>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Subtitle under "Current Executives"</label>
                <input type="text" name="home_execs_subtitle" value="{{ home_execs_subtitle }}" class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 font-medium text-base transition-all">
            </div>
        </div>

        <!-- Newsletter -->
        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-50 p-10 space-y-6">
            <h2 class="text-2xl font-black text-slate-700 border-l-4 border-emerald-500 pl-4">Home Page — Newsletter Section</h2>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Heading</label>
                <input type="text" name="home_newsletter_title" value="{{ home_newsletter_title }}" class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 font-bold text-lg transition-all">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Body Text</label>
                <textarea name="home_newsletter_body" rows="3" class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 font-medium text-base transition-all">{{ home_newsletter_body }}</textarea>
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-50 p-10 space-y-6">
            <h2 class="text-2xl font-black text-slate-700 border-l-4 border-amber-500 pl-4">Footer</h2>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Description</label>
                <textarea name="footer_description" rows="3" class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 font-medium text-base transition-all">{{ footer_description }}</textarea>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Contact Email</label>
                    <input type="text" name="footer_email" value="{{ footer_email }}" class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 font-medium text-base transition-all">
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Address</label>
                    <input type="text" name="footer_address" value="{{ footer_address }}" class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 font-medium text-base transition-all">
                </div>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold uppercase tracking-widest text-slate-400">Copyright Line</label>
                <input type="text" name="footer_copyright" value="{{ footer_copyright }}" class="w-full px-5 py-4 rounded-2xl bg-slate-100 border border-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-100 font-medium text-base transition-all">
            </div>
        </div>

        <button type="submit" class="w-full bg-blue-600 py-5 rounded-2xl text-white font-black text-xl hover:bg-blue-700 shadow-xl transition-all">Save All Changes</button>
    </form>
</div>
{% endblock %}

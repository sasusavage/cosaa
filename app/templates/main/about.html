{% extends 'base.html' %}
{% block title %}About - CoSSA{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto py-12">
    <h1 class="text-4xl md:text-6xl font-black text-slate-900 mb-10 tracking-tighter">About CoSSA</h1>

    <div class="space-y-12 leading-relaxed text-lg text-slate-600">
        <section class="bg-white p-12 rounded-[3.5rem] shadow-2xl border border-slate-50 italic">
            <h2 class="text-3xl font-bold text-blue-900 mb-6 font-Inter">Our Mission</h2>
            <p>{{ about_mission }}</p>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="bg-slate-100 p-10 rounded-[3rem] border border-slate-200">
                <h3 class="text-2xl font-bold mb-4 text-slate-800 tracking-tight">Vibrant Community</h3>
                <p>{{ about_community }}</p>
            </div>
            <div class="bg-indigo-900 p-10 rounded-[3rem] text-white">
                <h3 class="text-2xl font-bold mb-4 tracking-tight">Industry Focus</h3>
                <p>{{ about_industry }}</p>
            </div>
        </section>

        <section class="py-12 border-t border-slate-100">
            <h2 class="text-4xl font-black text-slate-900 mb-10 tracking-tighter">Our Values</h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-10 text-center">
                <div class="p-8 bg-white rounded-3xl shadow-lg">
                    <div class="text-5xl mb-4">💡</div>
                    <h4 class="font-bold text-slate-800">Innovation</h4>
                </div>
                <div class="p-8 bg-white rounded-3xl shadow-lg">
                    <div class="text-5xl mb-4">🤝</div>
                    <h4 class="font-bold text-slate-800">Collaboration</h4>
                </div>
                <div class="p-8 bg-white rounded-3xl shadow-lg">
                    <div class="text-5xl mb-4">🏆</div>
                    <h4 class="font-bold text-slate-800">Excellence</h4>
                </div>
            </div>
        </section>
    </div>
</div>
{% endblock %}
